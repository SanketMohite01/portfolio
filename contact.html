<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Sanket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Header styling */
    header {
      background-color: #343a40;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-weight: 600;
    }
    /* Contact section background */
    .contact {
      background-color: #f8f9fa;
      min-height: 80vh;
      display: flex;
      align-items: center;
    }
    /* Form card styling */
    .contact form {
      background-color: #fff;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    /* Button styling */
    .btn-primary {
      background-color: #0d6efd;
      border: none;
    }
    .btn-primary:hover {
      background-color: #0b5ed7;
    }
    footer {
      background-color: #343a40;
      color: #ccc;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="d-flex justify-content-between align-items-center p-3">
    <div class="d-flex align-items-center">
      <h1 class="ms-2 fs-4">Sanket</h1>
    </div>
    <a href="index.html" class="btn btn-light">Back to Home</a>
  </header>

  <!-- CONTACT FORM -->
  <section class="contact py-5">
    <div class="container">
      <h2 class="text-center mb-4">Send Me a Message</h2>
      <form action="https://formspree.io/f/xyzjvggy" method="POST" class="mx-auto" style="max-width:600px;">
        <div class="mb-3">
          <label class="form-label">Your Name</label>
          <input type="text" class="form-control" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Your Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" name="message" rows="5" required></textarea>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary px-4">Send Message</button>
        </div>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="py-3 text-center">
    <p>&copy; 2025 Sanket Mohite. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
